events { worker_connections 1024; }

http {
  # Wildcard subdomain → tenant resolution (acme.yourcrm.com)
  map $http_host $tenant_slug {
    ~^(?P<slug>[^.]+)\.yourcrm\.com$  $slug;
    default                             "";
  }

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name *.yourcrm.com yourcrm.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  # Main HTTPS server — handles all subdomains
  server {
    listen 443 ssl http2;
    server_name *.yourcrm.com yourcrm.com;

    ssl_certificate     /etc/letsencrypt/live/yourcrm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourcrm.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # WebSocket support (voice streaming)
    location /api/v1/voice/calls/ {
      proxy_pass http://api:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    # API routes
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://api:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — stricter rate limit
    location /auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://api:3000;
      proxy_set_header Host $host;
    }

    # GraphQL
    location /graphql {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://api:3000;
      proxy_set_header Host $host;
    }

    # Frontend SPA
    location / {
      proxy_pass http://frontend:80;
      proxy_set_header Host $host;
      # Try files, fall back to index.html for SPA routing
      proxy_intercept_errors on;
    }
  }
}
