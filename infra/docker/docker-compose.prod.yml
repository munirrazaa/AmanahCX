version: '3.9'

# Production-grade deployment — works on any Docker host (cloud VM, on-prem, bare metal)
# For cloud: deploy this on EC2/GCE/Azure VM or use Kubernetes manifests in /infra/k8s
# For on-prem: run on any Linux server with Docker installed

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm_platform}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      retries: 5

  api:
    image: ${REGISTRY:-ghcr.io/your-org}/crm-api:${VERSION:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN}
      API_BASE_URL: ${API_BASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - public

  frontend:
    image: ${REGISTRY:-ghcr.io/your-org}/crm-frontend:${VERSION:-latest}
    restart: unless-stopped
    networks:
      - public

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
    networks:
      - public

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_data:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Run: docker-compose run certbot certonly --webroot -w /var/www/certbot -d yourcrm.com

volumes:
  postgres_data:
  redis_data:
  certbot_data:
  certbot_certs:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
